name: Deploy to Production

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sklep.gorvita.pl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: DB backup before deploy
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/gorvita-shop
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            mkdir -p backups
            docker compose exec -T wordpress wp db export /tmp/pre-deploy-$TIMESTAMP.sql --allow-root
            docker compose cp wordpress:/tmp/pre-deploy-$TIMESTAMP.sql ./backups/ 2>/dev/null || true
          EOF

      # CRITICAL excludes — see deploy-staging.yml for rationale.
      - name: Rsync to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='data/images/' \
            --exclude='docs/' \
            --exclude='backups/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='wp-content/uploads/' \
            --exclude='wp-content/plugins/' \
            ./ deploy@${{ secrets.VPS_HOST }}:/opt/gorvita-shop/

      - name: Fix permissions + flush caches
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/gorvita-shop
            docker compose exec -T wordpress bash /var/scripts/fix-permissions.sh || true
            docker compose exec -T wordpress wp cache flush --allow-root
            docker compose exec -T wordpress wp rewrite flush --allow-root
            docker compose exec -T wordpress wp transient delete --all --allow-root
          EOF

      - name: Smoke test
        run: |
          curl -sSf -o /dev/null -w "HTTP %{http_code}\n" https://sklep.gorvita.pl/ || exit 1

      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deploy: $STATUS → https://sklep.gorvita.pl"
