name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sklep.gorvita.pl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: DB backup before deploy (gated — deploy aborts if backup fails)
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} 'bash -s' << 'EOF'
            set -eo pipefail
            cd /opt/gorvita-shop
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            mkdir -p backups
            BACKUP="backups/pre-deploy-$TIMESTAMP.sql.gz"
            # mariadb-dump streamed straight to a host file (no flaky docker cp).
            # pipefail makes a dump failure fail the whole step.
            docker compose exec -T mariadb sh -c 'mariadb-dump -uroot -p"$MYSQL_ROOT_PASSWORD" --single-transaction --quick --routines --triggers gorvita' | gzip > "$BACKUP"
            # gate: file must exist and be non-empty, else stop the deploy here
            if [ ! -s "$BACKUP" ]; then
              echo "FATAL: pre-deploy backup missing or empty ($BACKUP) — aborting deploy"
              exit 1
            fi
            echo "Pre-deploy backup OK: $BACKUP ($(du -h "$BACKUP" | cut -f1))"
          EOF

      # CRITICAL excludes — see deploy-staging.yml for rationale.
      - name: Rsync to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='docker-compose.yml' \
            --exclude='data/images/' \
            --exclude='docs/' \
            --exclude='backups/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='wp-content/uploads/' \
            --exclude='wp-content/plugins/' \
            ./ deploy@${{ secrets.VPS_HOST }}:/opt/gorvita-shop/

      - name: Fix permissions + flush caches
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/gorvita-shop
            docker compose exec -T wordpress bash /var/scripts/fix-permissions.sh || true
            docker compose exec -T wordpress wp cache flush --allow-root
            docker compose exec -T wordpress wp rewrite flush --allow-root
            docker compose exec -T wordpress wp transient delete --all --allow-root
          EOF

      - name: Smoke test
        run: |
          curl -sSf -o /dev/null -w "HTTP %{http_code}\n" https://sklep.gorvita.pl/ || exit 1

      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deploy: $STATUS → https://sklep.gorvita.pl"
