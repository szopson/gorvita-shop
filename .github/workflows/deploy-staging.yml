name: Deploy to Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # IMPORTANT rsync excludes:
      #  - wp-content/uploads/ → user-uploaded media (WP admin), NEVER overwrite from repo
      #  - wp-content/plugins/ → managed via Composer / manual install, NEVER overwrite
      #  - .git/.github/.env/docs/vendor/node_modules → CI infra, not production
      #  - data/images/ → scraper output, not deployable
      - name: Rsync to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='data/images/' \
            --exclude='docs/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='wp-content/uploads/' \
            --exclude='wp-content/plugins/' \
            ./ deploy@${{ secrets.VPS_HOST }}:/opt/gorvita-shop/

      - name: Fix permissions + flush WP cache
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/gorvita-shop
            docker compose exec -T wordpress bash /var/scripts/fix-permissions.sh || true
            docker compose exec -T wordpress wp cache flush --allow-root || true
            docker compose exec -T wordpress wp rewrite flush --allow-root || true
          EOF

      - name: Notify success
        if: success()
        run: echo "✓ Staging deploy complete → https://gorvita.srv1594477.hstgr.cloud"
